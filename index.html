<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可借用設備清單</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 圖示元件 (取代 lucide-react) ---
    const Smartphone = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>;
    const CheckCircle2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
    const Search = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const RefreshCw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const AlertTriangle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
    const Check = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 6 9 17l-5-5"/></svg>;
    const LayoutGrid = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>;
    const List = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>;

    // --- 主程式 ---
    const App = () => {
      // 狀態管理
      const [phones, setPhones] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [isLoading, setIsLoading] = useState(true);
      const [dataSource, setDataSource] = useState('google_sheet');
      const [error, setError] = useState(null);
      const [activeTab, setActiveTab] = useState('全部');
      const [selectedPhone, setSelectedPhone] = useState('');

      // --- Google Sheet 設定 ---
      const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1LsuBSpaKrnXN6GKM-6AFMbA9T286_TK3u9sQ9bzl2Pc/gviz/tq?tqx=out:csv&gid=600333233';

      // 簡易 CSV 解析器
      const parseCSVRow = (str) => {
        let result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < str.length; i++) {
          let char = str[i];
          if (char === '"' && str[i + 1] === '"') { current += '"'; i++; }
          else if (char === '"') { inQuotes = !inQuotes; }
          else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
          else { current += char; }
        }
        result.push(current.trim());
        return result;
      };

      // 載入資料的函數
      const fetchData = async () => {
        setIsLoading(true);
        setError(null);
        
        try {
          const response = await fetch(GOOGLE_SHEET_CSV_URL);
          if (!response.ok) throw new Error('網路回應錯誤');
          
          const csvText = await response.text();
          
          if (csvText.trim().toLowerCase().startsWith('<!doctype html>')) {
            throw new Error('權限不足');
          }

          const rows = csvText.split('\n').filter(row => row.trim() !== '');
          if (rows.length <= 1) {
            setPhones([]);
            setIsLoading(false);
            return;
          }

          const headers = parseCSVRow(rows[0]);
          
          const findColIndex = (keywords) => headers.findIndex(h => keywords.some(kw => h.includes(kw)));
          let idIdx = findColIndex(['編號', 'ID', '設備', '財產']);
          let modelIdx = findColIndex(['型號', '名稱', '手機', '設備名稱']);
          let statusIdx = findColIndex(['狀態', '借用', '可用', '是否']);

          if (idIdx === -1) idIdx = 0;
          if (modelIdx === -1) modelIdx = 1;

          const parsedData = [];
          for (let i = 1; i < rows.length; i++) {
            const cols = parseCSVRow(rows[i]);
            if (cols.length < 2) continue;

            const id = cols[idIdx]?.replace(/^"|"$/g, '') || '未知編號';
            const model = cols[modelIdx]?.replace(/^"|"$/g, '') || '未知型號';
            const rawStatus = statusIdx !== -1 && cols[statusIdx] ? cols[statusIdx].replace(/^"|"$/g, '') : '';

            const isUnavailable = /借出|維修|遺失|不可|損壞|無/.test(rawStatus);

            if (!isUnavailable) {
              parsedData.push({ id, model, status: 'available', rawStatus });
            }
          }
          
          setPhones(parsedData);
          setDataSource('google_sheet');
        } catch (error) {
          console.error('讀取 Google Sheet 失敗:', error);
          if (error.message === '權限不足') {
             setError('讀取失敗：請將您的 Google 表單「共用設定」改為「知道連結的任何人皆可查看」。');
          } else {
             setError('讀取表單資料失敗，請確認表單網址是否正確且已公開。');
          }
          setPhones([]);
        } finally {
          setIsLoading(false);
        }
      };

      useEffect(() => {
        fetchData();
      }, []);

      const tabs = ['全部', 'I', 'A', 'O', 'C'];

      const filteredPhones = phones.filter(phone => {
        const matchesSearch = phone.model.toLowerCase().includes(searchTerm.toLowerCase()) ||
                              phone.id.toLowerCase().includes(searchTerm.toLowerCase());
        const matchesTab = activeTab === '全部' || phone.id.toUpperCase().startsWith(activeTab);
        return matchesSearch && matchesTab;
      });

      return (
        <div className="min-h-screen bg-[#F8FAFC] py-8 px-4 sm:px-6 lg:px-8 font-sans text-slate-800 selection:bg-indigo-100 selection:text-indigo-900">
          <div className="max-w-5xl mx-auto space-y-6">
            
            <header className="flex flex-col sm:flex-row sm:items-end justify-between gap-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
              <div>
                <div className="flex items-center gap-3 mb-2">
                  <div className="p-2.5 bg-indigo-50 text-indigo-600 rounded-xl">
                    <Smartphone className="w-7 h-7" />
                  </div>
                  <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">可借用設備清單</h1>
                </div>
                <p className="text-slate-500 font-medium ml-1">
                  查看與確認專案目前閒置的測試機。
                  {dataSource === 'google_sheet' && !error && (
                    <span className="inline-flex items-center gap-1.5 ml-3 text-emerald-600 text-xs font-bold bg-emerald-50 px-2.5 py-1 rounded-full border border-emerald-100">
                      <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                      資料已同步
                    </span>
                  )}
                </p>
              </div>
              
              <button 
                onClick={fetchData}
                className="group flex items-center gap-2 px-5 py-2.5 bg-slate-50 border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50 rounded-xl transition-all duration-300 text-sm font-semibold text-slate-700 hover:text-indigo-700 shadow-sm"
              >
                <RefreshCw className={`w-4 h-4 ${isLoading ? 'animate-spin text-indigo-500' : 'text-slate-400 group-hover:text-indigo-600'}`} />
                重新載入
              </button>
            </header>

            {error && (
              <div className="p-5 bg-red-50/80 backdrop-blur-sm border border-red-200 rounded-2xl flex items-start gap-4 text-red-700 shadow-sm animate-in fade-in slide-in-from-top-4">
                <AlertTriangle className="w-6 h-6 flex-shrink-0 mt-0.5 text-red-500" />
                <div>
                  <h4 className="font-bold text-lg mb-1">無法載入資料</h4>
                  <p className="text-sm opacity-90">{error}</p>
                  <p className="text-sm mt-2 font-semibold bg-white/50 inline-block px-3 py-1 rounded-lg border border-red-100">
                    👉 請至 Google 表單右上角點擊「共用」➡️「一般存取權」➡️ 變更為「知道連結的任何人」。
                  </p>
                </div>
              </div>
            )}

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
              <div className="lg:col-span-12 space-y-6">
                
                <div className="bg-white p-2 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-2">
                  <div className="relative flex-1">
                    <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5" />
                    <input 
                      type="text" 
                      placeholder="搜尋型號或編號 (例: P-001)..." 
                      className="w-full pl-12 pr-4 py-3.5 rounded-xl bg-transparent border-none focus:ring-0 outline-none transition-all text-slate-700 font-medium placeholder-slate-400"
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                    />
                  </div>
                  
                  <div className="hidden md:block w-px bg-slate-100 my-2"></div>

                  <div className="flex items-center p-2 bg-slate-50/50 rounded-xl overflow-x-auto hide-scrollbar">
                    {tabs.map(tab => (
                      <button
                        key={tab}
                        onClick={() => {
                          setActiveTab(tab);
                          setSelectedPhone('');
                        }}
                        className={`px-5 py-2 rounded-lg font-bold text-sm transition-all whitespace-nowrap ${
                          activeTab === tab 
                            ? 'bg-indigo-600 text-white shadow-md shadow-indigo-200 scale-100' 
                            : 'text-slate-500 hover:text-slate-800 hover:bg-slate-200/50 scale-95 hover:scale-100'
                        }`}
                      >
                        {tab === '全部' ? '全部顯示' : `${tab} 系列`}
                      </button>
                    ))}
                  </div>
                </div>

                {isLoading ? (
                  <div className="flex flex-col items-center justify-center py-24 bg-white rounded-3xl border border-slate-100 shadow-sm">
                    <RefreshCw className="w-12 h-12 animate-spin text-indigo-400 mb-6" />
                    <p className="text-slate-500 font-medium text-lg">正在同步最新設備資料...</p>
                  </div>
                ) : (
                  <div className="space-y-6">
                    
                    {selectedPhone && (
                      <div className="bg-gradient-to-br from-indigo-600 to-blue-700 rounded-3xl p-6 sm:p-8 text-white shadow-lg shadow-indigo-200 flex flex-col sm:flex-row sm:items-center justify-between gap-6 relative overflow-hidden animate-in fade-in slide-in-from-bottom-4">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -translate-y-1/2 translate-x-1/3 blur-2xl"></div>
                        <div className="absolute bottom-0 left-0 w-40 h-40 bg-indigo-900 opacity-20 rounded-full translate-y-1/2 -translate-x-1/4 blur-xl"></div>
                        
                        <div className="relative z-10">
                          <div className="flex items-center gap-2 mb-2">
                            <CheckCircle2 className="w-5 h-5 text-indigo-200" />
                            <p className="text-indigo-100 font-semibold text-sm tracking-wide">您目前選擇的借用設備</p>
                          </div>
                          <div className="flex flex-col sm:flex-row sm:items-baseline gap-2 sm:gap-4 mt-1">
                            <h2 className="text-4xl sm:text-5xl font-black tracking-tight">{selectedPhone}</h2>
                            <span className="text-xl sm:text-2xl font-medium text-indigo-100 border-t sm:border-t-0 sm:border-l border-indigo-400/50 pt-2 sm:pt-0 sm:pl-4">
                              {phones.find(p => p.id === selectedPhone)?.model}
                            </span>
                          </div>
                        </div>
                      </div>
                    )}

                    <div className="bg-white p-6 sm:p-8 rounded-3xl border border-slate-100 shadow-sm">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 pb-6 border-b border-slate-100">
                        <div>
                          <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <LayoutGrid className="w-5 h-5 text-indigo-500" />
                            請選擇設備
                          </h3>
                          <p className="text-sm text-slate-500 mt-1">共找到 {filteredPhones.length} 台可借用</p>
                        </div>

                        <div className="w-full sm:w-72 relative">
                          <select 
                            className="w-full appearance-none px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-slate-700 text-sm font-bold cursor-pointer transition-colors hover:border-indigo-300"
                            value={selectedPhone}
                            onChange={(e) => setSelectedPhone(e.target.value)}
                          >
                            <option value="" disabled>-- 點擊展開下拉清單 --</option>
                            {filteredPhones.map(phone => (
                              <option key={phone.id} value={phone.id}>
                                {phone.id} - {phone.model}
                              </option>
                            ))}
                          </select>
                          <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                            <List className="w-4 h-4" />
                          </div>
                        </div>
                      </div>

                      {filteredPhones.length > 0 ? (
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                          {filteredPhones.map((phone) => {
                            const isSelected = selectedPhone === phone.id;
                            return (
                              <div 
                                key={phone.id} 
                                onClick={() => setSelectedPhone(phone.id)}
                                className={`group relative p-5 rounded-2xl border-2 transition-all duration-200 cursor-pointer flex flex-col justify-between min-h-[110px] ${
                                  isSelected 
                                    ? 'border-indigo-500 bg-indigo-50/40 shadow-md transform scale-[1.02] z-10' 
                                    : 'border-slate-100 bg-white hover:border-indigo-200 hover:shadow-sm hover:-translate-y-0.5'
                                }`}
                              >
                                <div className="flex justify-between items-start mb-3">
                                  <span className={`inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-black tracking-wide transition-colors ${
                                    isSelected ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 group-hover:bg-indigo-100 group-hover:text-indigo-700'
                                  }`}>
                                    {phone.id}
                                  </span>
                                  
                                  <div className={`w-6 h-6 rounded-full flex items-center justify-center transition-all ${
                                    isSelected ? 'bg-indigo-500 scale-100 opacity-100' : 'bg-slate-100 scale-50 opacity-0'
                                  }`}>
                                    <Check className="w-3.5 h-3.5 text-white stroke-[3]" />
                                  </div>
                                </div>
                                
                                <div className={`font-semibold text-sm line-clamp-2 transition-colors ${
                                  isSelected ? 'text-indigo-900' : 'text-slate-700 group-hover:text-slate-900'
                                }`}>
                                  {phone.model}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      ) : (
                        <div className="py-16 text-center bg-slate-50/50 rounded-2xl border border-dashed border-slate-200">
                          <Smartphone className="w-10 h-10 text-slate-300 mx-auto mb-3" />
                          <h4 className="text-slate-600 font-bold mb-1">找不到相符的設備</h4>
                          <p className="text-sm text-slate-400">目前此分類下沒有可借用的手機，請嘗試切換頁籤。</p>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // 渲染 React 應用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
